[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "secure-password-manager"
dynamic = ["version"]
description = "A secure CLI password manager with AES-256 encryption and zero-knowledge architecture"
readme = "README.md"
license = {text = "GPL-3.0-only"}
requires-python = ">=3.8"
authors = [
    { name = "King Hippopotamus" },
]
keywords = ["password", "manager", "security", "encryption", "cli"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: End Users/Desktop",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Security :: Cryptography",
    "Topic :: Utilities",
]
dependencies = [
    "cryptography>=36.0.0",
]

[project.scripts]
secure-password-manager = "password_manager.__main__:main"

[project.urls]
Homepage = "https://github.com/TheKingHippopotamus/Secure_CLI_Password_Manager_Cybersecurity_PythonEngineering"
Repository = "https://github.com/TheKingHippopotamus/Secure_CLI_Password_Manager_Cybersecurity_PythonEngineering"
Issues = "https://github.com/TheKingHippopotamus/Secure_CLI_Password_Manager_Cybersecurity_PythonEngineering/issues"

[tool.setuptools.dynamic]
version = {attr = "password_manager.__version__"}

[tool.setuptools.packages.find]
include = ["password_manager*"]
