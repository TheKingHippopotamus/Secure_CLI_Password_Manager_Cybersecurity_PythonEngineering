<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="tc-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <filter id="tc-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!--
    Tactical HUD corner bracket — top-left orientation.
    Use CSS transform to rotate for other corners:
      top-right:    transform: scaleX(-1)
      bottom-left:  transform: scaleY(-1)
      bottom-right: transform: scale(-1,-1)
  -->

  <!-- Main L-bracket — 2 thick gold lines -->
  <!-- Vertical arm of L -->
  <line x1="8" y1="8" x2="8" y2="44"
        stroke="url(#tc-gold)" stroke-width="2.5" stroke-linecap="square" filter="url(#tc-glow)"/>
  <!-- Horizontal arm of L -->
  <line x1="8" y1="8" x2="44" y2="8"
        stroke="url(#tc-gold)" stroke-width="2.5" stroke-linecap="square" filter="url(#tc-glow)"/>

  <!-- Corner cap square — where arms meet -->
  <rect x="5.5" y="5.5" width="5" height="5" fill="url(#tc-gold)" filter="url(#tc-glow)"/>

  <!-- Tick marks along vertical arm — 4 ticks at even intervals -->
  <g stroke="url(#tc-gold)" stroke-linecap="square" opacity="0.7">
    <!-- Outer ticks (pointing right from vertical arm) -->
    <line x1="8" y1="20" x2="15" y2="20" stroke-width="1.2"/>
    <line x1="8" y1="28" x2="13" y2="28" stroke-width="0.9"/>
    <line x1="8" y1="36" x2="15" y2="36" stroke-width="1.2"/>
  </g>
  <!-- Small measurement numbers beside ticks -->
  <g font-family="'Courier New', monospace" font-size="5.5" fill="#FFD700" opacity="0.5">
    <text x="17" y="22">10</text>
    <text x="15" y="30">20</text>
    <text x="17" y="38">30</text>
  </g>

  <!-- Tick marks along horizontal arm -->
  <g stroke="url(#tc-gold)" stroke-linecap="square" opacity="0.7">
    <!-- Ticks pointing down from horizontal arm -->
    <line x1="20" y1="8" x2="20" y2="15" stroke-width="1.2"/>
    <line x1="28" y1="8" x2="28" y2="13" stroke-width="0.9"/>
    <line x1="36" y1="8" x2="36" y2="15" stroke-width="1.2"/>
  </g>
  <!-- Numbers below horizontal ticks -->
  <g font-family="'Courier New', monospace" font-size="5.5" fill="#FFD700" opacity="0.5">
    <text x="17" y="24" transform="rotate(0)">10</text>
    <text x="25" y="24">20</text>
    <text x="33" y="24">30</text>
  </g>

  <!-- Secondary inner bracket — thinner, offset inward for HUD layering effect -->
  <polyline points="16,8 8,8 8,16"
            fill="none" stroke="url(#tc-gold)" stroke-width="0.8" opacity="0.4" stroke-linecap="square"/>

  <!-- Tertiary micro bracket — innermost detail -->
  <polyline points="22,8 8,8 8,22"
            fill="none" stroke="url(#tc-gold)" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.25" stroke-linecap="square"/>

  <!-- End cap marks — terminal ticks at arm ends -->
  <!-- Vertical arm end -->
  <line x1="5" y1="44" x2="12" y2="44" stroke="url(#tc-gold)" stroke-width="1.5" stroke-linecap="square" opacity="0.8"/>
  <line x1="6" y1="47" x2="10" y2="47" stroke="url(#tc-gold)" stroke-width="0.8" stroke-linecap="square" opacity="0.4"/>
  <!-- Horizontal arm end -->
  <line x1="44" y1="5" x2="44" y2="12" stroke="url(#tc-gold)" stroke-width="1.5" stroke-linecap="square" opacity="0.8"/>
  <line x1="47" y1="6" x2="47" y2="10" stroke="url(#tc-gold)" stroke-width="0.8" stroke-linecap="square" opacity="0.4"/>

</svg>
