<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 20" width="100" height="20">
  <!--
    Tileable military warning stripe pattern.
    Diagonal stripes at 45 degrees — yellow/dark alternating.
    Tile horizontally with CSS: background-repeat: repeat-x
    Each tile is 100px wide; stripes are 10px wide at 45deg.
  -->
  <defs>
    <pattern id="ws-stripe" x="0" y="0" width="28.28" height="28.28" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <!-- Dark stripe -->
      <rect x="0" y="0" width="14.14" height="28.28" fill="#0a0e1a"/>
      <!-- Gold/yellow stripe -->
      <rect x="14.14" y="0" width="14.14" height="28.28" fill="#FFD700" opacity="0.85"/>
    </pattern>
  </defs>

  <!-- Fill entire tile with the stripe pattern -->
  <rect width="100" height="20" fill="url(#ws-stripe)"/>

  <!-- Top and bottom border lines — thin tactical lines -->
  <line x1="0" y1="0.5" x2="100" y2="0.5" stroke="#FFD700" stroke-width="0.8" opacity="0.6"/>
  <line x1="0" y1="19.5" x2="100" y2="19.5" stroke="#FFD700" stroke-width="0.8" opacity="0.6"/>
</svg>
