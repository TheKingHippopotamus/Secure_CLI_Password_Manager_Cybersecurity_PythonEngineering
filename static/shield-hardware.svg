<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="hw-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="hw-green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#69F0AE"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <linearGradient id="hw-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1f12"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <filter id="hw-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background — dark with green tint for circuit -->
  <rect x="2" y="2" width="44" height="44" rx="6" fill="url(#hw-bg)" stroke="url(#hw-gold)" stroke-width="1.8" filter="url(#hw-glow)"/>
  <rect x="4" y="4" width="40" height="40" rx="5" fill="none" stroke="url(#hw-gold)" stroke-width="0.5" opacity="0.3"/>

  <!-- Chip body — center -->
  <rect x="15" y="15" width="18" height="18" rx="2" fill="#0f1e16" stroke="url(#hw-green)" stroke-width="1.5"/>
  <!-- Chip inner core -->
  <rect x="18" y="18" width="12" height="12" rx="1" fill="#00897B" opacity="0.2"/>
  <!-- Cross pattern on chip face -->
  <line x1="24" y1="15" x2="24" y2="33" stroke="url(#hw-green)" stroke-width="0.6" opacity="0.5"/>
  <line x1="15" y1="24" x2="33" y2="24" stroke="url(#hw-green)" stroke-width="0.6" opacity="0.5"/>
  <!-- Chip label mark -->
  <circle cx="24" cy="24" r="3" fill="none" stroke="url(#hw-green)" stroke-width="1" opacity="0.8"/>
  <!-- Notch on chip top-left (orientation mark) -->
  <path d="M15,15 L18,15 A3,3 0 0,0 15,18 Z" fill="url(#hw-green)" opacity="0.6"/>

  <!-- Circuit traces — left side pins -->
  <g stroke="url(#hw-green)" stroke-width="1" stroke-linecap="round" opacity="0.8">
    <!-- Left pins (3 pins) -->
    <line x1="2" y1="18" x2="10" y2="18"/>
    <line x1="10" y1="18" x2="15" y2="18"/>
    <line x1="2" y1="24" x2="15" y2="24"/>
    <line x1="2" y1="30" x2="10" y2="30"/>
    <line x1="10" y1="30" x2="15" y2="30"/>
    <!-- Pin endpoint marks -->
    <rect x="2" y="16.5" width="3" height="3" rx="0.5" fill="url(#hw-green)" opacity="0.9"/>
    <rect x="2" y="22.5" width="3" height="3" rx="0.5" fill="url(#hw-green)" opacity="0.9"/>
    <rect x="2" y="28.5" width="3" height="3" rx="0.5" fill="url(#hw-green)" opacity="0.9"/>
    <!-- Right pins -->
    <line x1="46" y1="18" x2="38" y2="18"/>
    <line x1="38" y1="18" x2="33" y2="18"/>
    <line x1="46" y1="24" x2="33" y2="24"/>
    <line x1="46" y1="30" x2="38" y2="30"/>
    <line x1="38" y1="30" x2="33" y2="30"/>
    <rect x="43" y="16.5" width="3" height="3" rx="0.5" fill="url(#hw-green)" opacity="0.9"/>
    <rect x="43" y="22.5" width="3" height="3" rx="0.5" fill="url(#hw-green)" opacity="0.9"/>
    <rect x="43" y="28.5" width="3" height="3" rx="0.5" fill="url(#hw-green)" opacity="0.9"/>
    <!-- Top pins -->
    <line x1="18" y1="2" x2="18" y2="15"/>
    <line x1="24" y1="2" x2="24" y2="15"/>
    <line x1="30" y1="2" x2="30" y2="15"/>
    <rect x="16.5" y="2" width="3" height="3" rx="0.5" fill="url(#hw-green)" opacity="0.9"/>
    <rect x="22.5" y="2" width="3" height="3" rx="0.5" fill="url(#hw-green)" opacity="0.9"/>
    <rect x="28.5" y="2" width="3" height="3" rx="0.5" fill="url(#hw-green)" opacity="0.9"/>
    <!-- Bottom pins -->
    <line x1="18" y1="46" x2="18" y2="33"/>
    <line x1="24" y1="46" x2="24" y2="33"/>
    <line x1="30" y1="46" x2="30" y2="33"/>
    <rect x="16.5" y="43" width="3" height="3" rx="0.5" fill="url(#hw-green)" opacity="0.9"/>
    <rect x="22.5" y="43" width="3" height="3" rx="0.5" fill="url(#hw-green)" opacity="0.9"/>
    <rect x="28.5" y="43" width="3" height="3" rx="0.5" fill="url(#hw-green)" opacity="0.9"/>
  </g>

  <!-- Chain link overlay — top right corner indicates "bound" -->
  <!-- Link 1 -->
  <ellipse cx="37" cy="10" rx="4" ry="2.5" fill="none" stroke="url(#hw-gold)" stroke-width="1.8" transform="rotate(-40 37 10)" filter="url(#hw-glow)"/>
  <!-- Link 2 (overlapping) -->
  <ellipse cx="41" cy="7" rx="4" ry="2.5" fill="none" stroke="url(#hw-gold)" stroke-width="1.8" transform="rotate(-40 41 7)" filter="url(#hw-glow)"/>

</svg>
