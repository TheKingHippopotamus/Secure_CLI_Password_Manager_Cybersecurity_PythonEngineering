<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bb-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="bb-steel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="bb-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4FC3F7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#01579B" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="bb-door" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="50%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#1C2731"/>
    </linearGradient>
    <filter id="bb-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bb-inner-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer badge background fill -->
  <circle cx="100" cy="100" r="96" fill="url(#bb-steel)"/>

  <!-- Outer border ring — double border -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#bb-gold)" stroke-width="3" filter="url(#bb-glow)"/>
  <circle cx="100" cy="100" r="89" fill="none" stroke="url(#bb-gold)" stroke-width="1" opacity="0.5"/>

  <!-- Inner structural ring with hash marks -->
  <circle cx="100" cy="100" r="76" fill="none" stroke="url(#bb-gold)" stroke-width="0.8" opacity="0.3"/>
  <!-- Hash marks on inner ring — 24 marks, every 15 degrees -->
  <g stroke="url(#bb-gold)" stroke-linecap="square" opacity="0.5">
    <!-- Every 15 degrees around r=82.5 (between r=76 and r=89) -->
    <line x1="100" y1="17.5" x2="100" y2="24"/>
    <line x1="121.3" y1="20.1" x2="118.8" y2="26.2"/>
    <line x1="139.9" y1="28.7" x2="135.5" y2="33.8"/>
    <line x1="154" y1="42.7" x2="148.2" y2="46.6"/>
    <line x1="162.5" y1="60" x2="156.3" y2="62.5"/>
    <line x1="165" y1="79" x2="158.5" y2="79"/>
    <line x1="162.5" y1="98" x2="156.3" y2="97.5"/>
    <line x1="154" y1="115.5" x2="148.2" y2="111.5"/>
    <line x1="139.9" y1="129.5" x2="135.5" y2="124.4"/>
    <line x1="121.3" y1="138.1" x2="118.8" y2="132"/>
    <line x1="100" y1="141.5" x2="100" y2="135"/>
    <!-- Bottom half — only ticks above bottom text zone -->
    <line x1="78.7" y1="138.1" x2="81.2" y2="132"/>
    <line x1="60.1" y1="129.5" x2="64.5" y2="124.4"/>
    <line x1="46" y1="115.5" x2="51.8" y2="111.5"/>
    <line x1="37.5" y1="98" x2="43.7" y2="97.5"/>
    <line x1="35" y1="79" x2="41.5" y2="79"/>
    <line x1="37.5" y1="60" x2="43.7" y2="62.5"/>
    <line x1="46" y1="42.7" x2="51.8" y2="46.6"/>
    <line x1="60.1" y1="28.7" x2="64.5" y2="33.8"/>
    <line x1="78.7" y1="20.1" x2="81.2" y2="26.2"/>
  </g>

  <!-- ═══════════════════════════════ -->
  <!-- TOP ARC TEXT: "IRON DOME"       -->
  <!-- ═══════════════════════════════ -->
  <path id="top-arc" d="M 22,100 A 78,78 0 0,1 178,100" fill="none"/>
  <text font-family="'Helvetica Neue', Arial, sans-serif" font-size="15"
        font-weight="800" letter-spacing="5" fill="url(#bb-gold)" filter="url(#bb-glow)">
    <textPath href="#top-arc" startOffset="12%">IRON DOME</textPath>
  </text>

  <!-- ═══════════════════════════════ -->
  <!-- BOTTOM ARC TEXT: "BUNKER DIVISION" -->
  <!-- ═══════════════════════════════ -->
  <path id="bottom-arc" d="M 22,100 A 78,78 0 0,0 178,100" fill="none"/>
  <text font-family="'Helvetica Neue', Arial, sans-serif" font-size="11.5"
        font-weight="700" letter-spacing="3.5" fill="url(#bb-gold)" opacity="0.85">
    <textPath href="#bottom-arc" startOffset="8%">BUNKER DIVISION</textPath>
  </text>

  <!-- ═══════════════════════════════ -->
  <!-- 3 O'CLOCK STAR                  -->
  <!-- ═══════════════════════════════ -->
  <polygon points="155,97 156.6,101.9 161.8,101.9 157.6,104.8 159.2,109.7 155,106.8 150.8,109.7 152.4,104.8 148.2,101.9 153.4,101.9"
           fill="url(#bb-gold)" filter="url(#bb-glow)" opacity="0.9"
           transform="scale(0.7) translate(74,46)"/>

  <!-- ═══════════════════════════════ -->
  <!-- 9 O'CLOCK STAR                  -->
  <!-- ═══════════════════════════════ -->
  <polygon points="155,97 156.6,101.9 161.8,101.9 157.6,104.8 159.2,109.7 155,106.8 150.8,109.7 152.4,104.8 148.2,101.9 153.4,101.9"
           fill="url(#bb-gold)" filter="url(#bb-glow)" opacity="0.9"
           transform="scale(0.7) translate(-88,46)"/>

  <!-- ═══════════════════════════════ -->
  <!-- CENTER: BUNKER ENTRANCE         -->
  <!-- ═══════════════════════════════ -->

  <!-- Bunker earth mound -->
  <path d="M55,130 Q100,80 145,130 Z" fill="#1a2535" stroke="url(#bb-gold)" stroke-width="1.5" opacity="0.9"/>

  <!-- Blast door frame — recessed bunker entrance -->
  <rect x="76" y="103" width="48" height="38" rx="4" fill="#0d1420" stroke="url(#bb-gold)" stroke-width="2"/>

  <!-- Blast door panels — steel plates with rivets feel -->
  <rect x="79" y="106" width="20" height="32" rx="2" fill="url(#bb-door)" stroke="#546E7A" stroke-width="0.8"/>
  <rect x="101" y="106" width="20" height="32" rx="2" fill="url(#bb-door)" stroke="#546E7A" stroke-width="0.8"/>

  <!-- Door center seam -->
  <line x1="100" y1="108" x2="100" y2="136" stroke="url(#bb-gold)" stroke-width="1.5" opacity="0.6"/>

  <!-- Door horizontal reinforcement bars -->
  <line x1="79" y1="116" x2="121" y2="116" stroke="#546E7A" stroke-width="1" opacity="0.7"/>
  <line x1="79" y1="125" x2="121" y2="125" stroke="#546E7A" stroke-width="1" opacity="0.7"/>

  <!-- Lock symbol on door center -->
  <circle cx="100" cy="118" r="6" fill="none" stroke="url(#bb-gold)" stroke-width="1.8" filter="url(#bb-glow)"/>
  <path d="M96,118 L96,124 L104,124 L104,118" fill="none" stroke="url(#bb-gold)" stroke-width="1.5"/>
  <rect x="97" y="121" width="6" height="5" rx="1" fill="url(#bb-gold)" opacity="0.9"/>
  <!-- Lock shackle arc -->
  <path d="M97,118 A3,4 0 0,1 103,118" fill="none" stroke="url(#bb-gold)" stroke-width="1.5"/>

  <!-- Blue accent glow below dome arc on bunker face -->
  <path d="M64,103 Q100,72 136,103" fill="none" stroke="url(#bb-blue)" stroke-width="1.5" opacity="0.6" filter="url(#bb-inner-glow)"/>

  <!-- Bunker corner bolts / rivets -->
  <circle cx="80" cy="107" r="1.5" fill="#90A4AE" opacity="0.7"/>
  <circle cx="120" cy="107" r="1.5" fill="#90A4AE" opacity="0.7"/>
  <circle cx="80" cy="138" r="1.5" fill="#90A4AE" opacity="0.7"/>
  <circle cx="120" cy="138" r="1.5" fill="#90A4AE" opacity="0.7"/>

  <!-- Ventilation slits above door -->
  <rect x="84" y="96" width="32" height="3" rx="1" fill="#0d1420" stroke="#37474F" stroke-width="0.8"/>
  <line x1="92" y1="96" x2="92" y2="99" stroke="#263238" stroke-width="1"/>
  <line x1="100" y1="96" x2="100" y2="99" stroke="#263238" stroke-width="1"/>
  <line x1="108" y1="96" x2="108" y2="99" stroke="#263238" stroke-width="1"/>

</svg>
