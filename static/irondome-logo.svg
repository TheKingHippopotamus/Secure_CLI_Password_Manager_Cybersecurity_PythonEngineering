<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" width="600" height="140">
  <defs>
    <linearGradient id="shieldGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="70%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="textGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#E6A800"/>
    </linearGradient>
    <linearGradient id="domeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="50%" stop-color="#0288D1"/>
      <stop offset="100%" stop-color="#01579B"/>
    </linearGradient>
    <linearGradient id="ironGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B0BEC5"/>
      <stop offset="40%" stop-color="#78909C"/>
      <stop offset="100%" stop-color="#455A64"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield icon -->
  <g transform="translate(20, 8)" filter="url(#glow)">
    <!-- Outer shield -->
    <path d="M60,8 L108,24 L108,68 C108,96 88,116 60,124 C32,116 12,96 12,68 L12,24 Z"
          fill="none" stroke="url(#shieldGold)" stroke-width="3"/>
    <!-- Inner shield fill -->
    <path d="M60,14 L102,28 L102,68 C102,92 84,110 60,118 C36,110 18,92 18,68 L18,28 Z"
          fill="#0a0e1a" opacity="0.85"/>
    <!-- Dome arc -->
    <path d="M30,72 Q60,28 90,72" fill="none" stroke="url(#domeGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Dome base -->
    <line x1="28" y1="72" x2="92" y2="72" stroke="url(#domeGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Interceptor lines -->
    <line x1="60" y1="48" x2="42" y2="30" stroke="#4FC3F7" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
    <line x1="60" y1="48" x2="60" y2="24" stroke="#4FC3F7" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
    <line x1="60" y1="48" x2="78" y2="30" stroke="#4FC3F7" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
    <!-- Interceptor dots -->
    <circle cx="42" cy="30" r="2.5" fill="#4FC3F7" filter="url(#softGlow)"/>
    <circle cx="60" cy="24" r="2.5" fill="#4FC3F7" filter="url(#softGlow)"/>
    <circle cx="78" cy="30" r="2.5" fill="#4FC3F7" filter="url(#softGlow)"/>
    <!-- Lock keyhole -->
    <circle cx="60" cy="86" r="7" fill="none" stroke="url(#shieldGold)" stroke-width="2"/>
    <rect x="57" y="90" width="6" height="10" rx="1" fill="url(#shieldGold)"/>
    <circle cx="60" cy="86" r="3" fill="url(#shieldGold)"/>
  </g>

  <!-- IRON text -->
  <text x="148" y="88" font-family="'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="5" fill="url(#ironGrad)" filter="url(#glow)">IRON</text>

  <!-- DOME text -->
  <text x="370" y="88" font-family="'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="5" fill="url(#textGold)" filter="url(#glow)">DOME</text>

  <!-- Underline accent -->
  <line x1="148" y1="100" x2="560" y2="100" stroke="url(#shieldGold)" stroke-width="1.5" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="354" y="124" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="8" fill="#78909C" opacity="0.8">SECURE PASSWORD VAULT</text>
</svg>
