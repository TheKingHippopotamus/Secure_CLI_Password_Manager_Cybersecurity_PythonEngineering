<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <defs>
    <!-- Gradients -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="steelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CFD8DC"/>
      <stop offset="35%" stop-color="#90A4AE"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
    <linearGradient id="domeBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="60%" stop-color="#0288D1"/>
      <stop offset="100%" stop-color="#01579B"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF8F00" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="bgShield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1525"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <!-- Gold glow filter -->
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Blue glow for interceptors -->
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Subtle text glow -->
    <filter id="textGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- TACTICAL SHIELD EMBLEM — left side                     -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <g transform="translate(12, 8)">

    <!-- Outer ring background -->
    <circle cx="68" cy="72" r="62" fill="#080c17" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.9"/>

    <!-- Outer ring with military hash marks (radar/compass ring) -->
    <!-- Major hash marks at 0/30/60/90/120/150/180/210/240/270/300/330 deg -->
    <g stroke="url(#goldGrad)" stroke-linecap="square" opacity="0.85">
      <!-- 12 major ticks (every 30°) -->
      <line x1="68" y1="10" x2="68" y2="18"/>
      <line x1="99" y1="17.9" x2="95.3" y2="25.3"/>
      <line x1="122.1" y1="41" x2="114.7" y2="45.3"/>
      <line x1="130" y1="72" x2="122" y2="72"/>
      <line x1="122.1" y1="103" x2="114.7" y2="98.7"/>
      <line x1="99" y1="126.1" x2="95.3" y2="118.7"/>
      <line x1="68" y1="134" x2="68" y2="126"/>
      <line x1="37" y1="126.1" x2="40.7" y2="118.7"/>
      <line x1="13.9" y1="103" x2="21.3" y2="98.7"/>
      <line x1="6" y1="72" x2="14" y2="72"/>
      <line x1="13.9" y1="41" x2="21.3" y2="45.3"/>
      <line x1="37" y1="17.9" x2="40.7" y2="25.3"/>
    </g>
    <!-- Minor hash marks (every 15°, between majors) — shorter -->
    <g stroke="url(#goldGrad)" stroke-width="0.8" stroke-linecap="square" opacity="0.45">
      <line x1="84.3" y1="11.2" x2="82.7" y2="17.8"/>
      <line x1="111.5" y1="28.5" x2="107.1" y2="33.4"/>
      <line x1="126.8" y1="56.3" x2="120.5" y2="57.9"/>
      <line x1="126.8" y1="87.7" x2="120.5" y2="86.1"/>
      <line x1="111.5" y1="115.5" x2="107.1" y2="110.6"/>
      <line x1="84.3" y1="132.8" x2="82.7" y2="126.2"/>
      <line x1="51.7" y1="132.8" x2="53.3" y2="126.2"/>
      <line x1="24.5" y1="115.5" x2="28.9" y2="110.6"/>
      <line x1="9.2" y1="87.7" x2="15.5" y2="86.1"/>
      <line x1="9.2" y1="56.3" x2="15.5" y2="57.9"/>
      <line x1="24.5" y1="28.5" x2="28.9" y2="33.4"/>
      <line x1="51.7" y1="11.2" x2="53.3" y2="17.8"/>
    </g>

    <!-- Second inner ring — structural separator -->
    <circle cx="68" cy="72" r="54" fill="none" stroke="url(#ringGrad)" stroke-width="0.7" opacity="0.5"/>

    <!-- Radar sweep wedge — static representation (~40° arc) -->
    <path d="M68,72 L68,18 A54,54 0 0,1 114.8,58.7 Z"
          fill="url(#domeBlue)" opacity="0.07"/>
    <!-- Sweep leading edge line -->
    <line x1="68" y1="72" x2="114.8" y2="58.7"
          stroke="#4FC3F7" stroke-width="1" opacity="0.4"/>
    <!-- Sweep trailing edge line -->
    <line x1="68" y1="72" x2="68" y2="18"
          stroke="#4FC3F7" stroke-width="0.7" opacity="0.2"/>

    <!-- Crosshair cardinal lines (inside ring, faint) -->
    <line x1="68" y1="20" x2="68" y2="124" stroke="#4FC3F7" stroke-width="0.5" opacity="0.2"/>
    <line x1="16" y1="72" x2="120" y2="72" stroke="#4FC3F7" stroke-width="0.5" opacity="0.2"/>

    <!-- Shield body -->
    <path d="M68,22 L110,38 L110,78 C110,104 92,122 68,132 C44,122 26,104 26,78 L26,38 Z"
          fill="url(#bgShield)" stroke="url(#goldGrad)" stroke-width="2" filter="url(#goldGlow)"/>
    <!-- Shield inner bevel -->
    <path d="M68,28 L104,42 L104,78 C104,100 88,116 68,126 C48,116 32,100 32,78 L32,42 Z"
          fill="none" stroke="url(#goldGrad)" stroke-width="0.6" opacity="0.4"/>

    <!-- Dome arc (Iron Dome silhouette) -->
    <path d="M36,84 Q68,42 100,84"
          fill="none" stroke="url(#domeBlue)" stroke-width="3" stroke-linecap="round" filter="url(#blueGlow)"/>
    <!-- Dome base ground line -->
    <line x1="34" y1="84" x2="102" y2="84"
          stroke="url(#domeBlue)" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

    <!-- Interceptor missile trails — 3 launches from dome apex -->
    <!-- Left trajectory -->
    <line x1="68" y1="62" x2="44" y2="40" stroke="#4FC3F7" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <polygon points="44,36 41,43 48,41" fill="#4FC3F7" opacity="0.9"/>
    <!-- Center trajectory -->
    <line x1="68" y1="62" x2="68" y2="36" stroke="#4FC3F7" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <polygon points="68,31 64.5,39 71.5,39" fill="#4FC3F7" opacity="0.9"/>
    <!-- Right trajectory -->
    <line x1="68" y1="62" x2="92" y2="40" stroke="#4FC3F7" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <polygon points="92,36 91,44 97,41" fill="#4FC3F7" opacity="0.9"/>
    <!-- Intercept burst dots -->
    <circle cx="44" cy="40" r="3" fill="#4FC3F7" filter="url(#blueGlow)" opacity="0.9"/>
    <circle cx="68" cy="36" r="3" fill="#4FC3F7" filter="url(#blueGlow)" opacity="0.9"/>
    <circle cx="92" cy="40" r="3" fill="#4FC3F7" filter="url(#blueGlow)" opacity="0.9"/>

    <!-- Reticle crosshair on center intercept -->
    <circle cx="68" cy="36" r="7" fill="none" stroke="#4FC3F7" stroke-width="0.8" opacity="0.6"/>
    <line x1="64" y1="36" x2="72" y2="36" stroke="#4FC3F7" stroke-width="0.8" opacity="0.6"/>
    <line x1="68" y1="32" x2="68" y2="40" stroke="#4FC3F7" stroke-width="0.8" opacity="0.6"/>

    <!-- Launch hub dot -->
    <circle cx="68" cy="62" r="3.5" fill="url(#goldGrad)" filter="url(#goldGlow)"/>

    <!-- Bottom shield: lock symbol -->
    <circle cx="68" cy="103" r="8" fill="none" stroke="url(#goldGrad)" stroke-width="1.8"/>
    <rect x="64.5" y="108" width="7" height="9" rx="1.5" fill="url(#goldGrad)"/>
    <circle cx="68" cy="103" r="3" fill="url(#goldGrad)"/>

    <!-- Corner reticle brackets (shield corners — tactical HUD) -->
    <g stroke="url(#goldGrad)" stroke-width="1" opacity="0.6">
      <!-- Top-left bracket -->
      <polyline points="38,46 34,46 34,52"/>
      <!-- Top-right bracket -->
      <polyline points="98,46 102,46 102,52"/>
      <!-- Bottom-left bracket -->
      <polyline points="38,104 34,104 34,98"/>
      <!-- Bottom-right bracket -->
      <polyline points="98,104 102,104 102,98"/>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- TEXT BLOCK                                              -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Tactical brackets framing text block -->
  <g stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.5" fill="none">
    <!-- Top-left -->
    <polyline points="152,18 145,18 145,30"/>
    <!-- Top-right -->
    <polyline points="576,18 583,18 583,30"/>
    <!-- Bottom-left -->
    <polyline points="152,138 145,138 145,126"/>
    <!-- Bottom-right -->
    <polyline points="576,138 583,138 583,126"/>
  </g>

  <!-- "IRON" — steel/gunmetal gradient, condensed military stencil feel -->
  <text x="154" y="97"
        font-family="'Helvetica Neue', 'Arial Narrow', Arial, sans-serif"
        font-size="74" font-weight="900"
        letter-spacing="6"
        fill="url(#steelGrad)"
        filter="url(#textGlow)">IRON</text>

  <!-- "DOME" — gold/amber -->
  <text x="386" y="97"
        font-family="'Helvetica Neue', 'Arial Narrow', Arial, sans-serif"
        font-size="74" font-weight="900"
        letter-spacing="6"
        fill="url(#goldGrad)"
        filter="url(#goldGlow)">DOME</text>

  <!-- Separator line under title -->
  <line x1="154" y1="108" x2="577" y2="108"
        stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.35"/>

  <!-- Subtitle line with military stars -->
  <!-- Left star -->
  <polygon points="162,121 163.8,126.5 169.6,126.5 164.9,129.7 166.7,135.2 162,132 157.3,135.2 159.1,129.7 154.4,126.5 160.2,126.5"
           fill="url(#goldGrad)" opacity="0.8" transform="scale(0.55) translate(132,104)"/>
  <!-- Right star -->
  <polygon points="162,121 163.8,126.5 169.6,126.5 164.9,129.7 166.7,135.2 162,132 157.3,135.2 159.1,129.7 154.4,126.5 160.2,126.5"
           fill="url(#goldGrad)" opacity="0.8" transform="scale(0.55) translate(815,104)"/>

  <!-- "SECURE PASSWORD VAULT" subtitle -->
  <text x="365" y="125"
        text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11.5" font-weight="500"
        letter-spacing="9"
        fill="#90A4AE"
        opacity="0.9">SECURE PASSWORD VAULT</text>

  <!-- Bottom tagline — 3 tenets -->
  <text x="365" y="143"
        text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="7.5" font-weight="400"
        letter-spacing="2.5"
        fill="#546E7A"
        opacity="0.75">MILITARY-GRADE ENCRYPTION  •  ZERO KNOWLEDGE  •  LOCAL ONLY</text>

</svg>
