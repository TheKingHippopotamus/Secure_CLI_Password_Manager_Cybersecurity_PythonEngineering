<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="rec-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="rec-steel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#546E7A"/>
      <stop offset="100%" stop-color="#1C2731"/>
    </linearGradient>
    <linearGradient id="rec-purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
    <filter id="rec-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield body -->
  <path d="M24,3 L42,9 L42,26 C42,37 34,44 24,47 C14,44 6,37 6,26 L6,9 Z"
        fill="url(#rec-steel)" stroke="url(#rec-gold)" stroke-width="1.8" filter="url(#rec-glow)"/>
  <!-- Shield inner bevel -->
  <path d="M24,6 L39,11.5 L39,26 C39,35 32,41 24,44 C16,41 9,35 9,26 L9,11.5 Z"
        fill="none" stroke="url(#rec-gold)" stroke-width="0.5" opacity="0.4"/>

  <!-- Small wings -->
  <path d="M6,18 C2,16 0,18 1,21 C2,22 4,22 6,21" fill="none" stroke="url(#rec-gold)" stroke-width="1.2" opacity="0.8"/>
  <line x1="1.5" y1="19.5" x2="6" y2="19.5" stroke="url(#rec-gold)" stroke-width="0.7" opacity="0.6"/>
  <path d="M42,18 C46,16 48,18 47,21 C46,22 44,22 42,21" fill="none" stroke="url(#rec-gold)" stroke-width="1.2" opacity="0.8"/>
  <line x1="46.5" y1="19.5" x2="42" y2="19.5" stroke="url(#rec-gold)" stroke-width="0.7" opacity="0.6"/>

  <!-- Seed phrase / word grid (3x3 grid representing 24 words) -->
  <!-- Top row -->
  <rect x="13" y="15" width="6" height="3" rx="0.5" fill="url(#rec-purple)" opacity="0.8"/>
  <rect x="21" y="15" width="6" height="3" rx="0.5" fill="url(#rec-purple)" opacity="0.7"/>
  <rect x="29" y="15" width="6" height="3" rx="0.5" fill="url(#rec-purple)" opacity="0.8"/>
  <!-- Middle row -->
  <rect x="13" y="20" width="6" height="3" rx="0.5" fill="url(#rec-purple)" opacity="0.7"/>
  <rect x="21" y="20" width="6" height="3" rx="0.5" fill="url(#rec-purple)" opacity="0.8"/>
  <rect x="29" y="20" width="6" height="3" rx="0.5" fill="url(#rec-purple)" opacity="0.7"/>
  <!-- Bottom row -->
  <rect x="13" y="25" width="6" height="3" rx="0.5" fill="url(#rec-purple)" opacity="0.8"/>
  <rect x="21" y="25" width="6" height="3" rx="0.5" fill="url(#rec-purple)" opacity="0.7"/>
  <rect x="29" y="25" width="6" height="3" rx="0.5" fill="url(#rec-purple)" opacity="0.8"/>

  <!-- Word number labels -->
  <g font-family="'Courier New', monospace" font-size="2" fill="#1C2731" font-weight="700" opacity="0.7">
    <text x="16" y="17.2" text-anchor="middle">01</text>
    <text x="24" y="17.2" text-anchor="middle">02</text>
    <text x="32" y="17.2" text-anchor="middle">03</text>
    <text x="16" y="22.2" text-anchor="middle">04</text>
    <text x="24" y="22.2" text-anchor="middle">05</text>
    <text x="32" y="22.2" text-anchor="middle">06</text>
    <text x="16" y="27.2" text-anchor="middle">07</text>
    <text x="24" y="27.2" text-anchor="middle">08</text>
    <text x="32" y="27.2" text-anchor="middle">...</text>
  </g>

  <!-- Circular arrow (recovery/restore symbol) -->
  <path d="M18,34 A6,6 0 1,1 30,34" fill="none" stroke="url(#rec-gold)" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="30,31.5 30,36.5 33,34" fill="url(#rec-gold)" opacity="0.9"/>

  <!-- "BIP-39" label -->
  <text x="24" y="42"
        text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="5.5" font-weight="900"
        letter-spacing="0.3"
        fill="url(#rec-gold)"
        opacity="0.95">BIP-39</text>

</svg>
