<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bak-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="bak-steel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#546E7A"/>
      <stop offset="100%" stop-color="#1C2731"/>
    </linearGradient>
    <linearGradient id="bak-teal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#80CBC4"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <filter id="bak-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield body -->
  <path d="M24,3 L42,9 L42,26 C42,37 34,44 24,47 C14,44 6,37 6,26 L6,9 Z"
        fill="url(#bak-steel)" stroke="url(#bak-gold)" stroke-width="1.8" filter="url(#bak-glow)"/>
  <!-- Shield inner bevel -->
  <path d="M24,6 L39,11.5 L39,26 C39,35 32,41 24,44 C16,41 9,35 9,26 L9,11.5 Z"
        fill="none" stroke="url(#bak-gold)" stroke-width="0.5" opacity="0.4"/>

  <!-- Small wings -->
  <path d="M6,18 C2,16 0,18 1,21 C2,22 4,22 6,21" fill="none" stroke="url(#bak-gold)" stroke-width="1.2" opacity="0.8"/>
  <line x1="1.5" y1="19.5" x2="6" y2="19.5" stroke="url(#bak-gold)" stroke-width="0.7" opacity="0.6"/>
  <path d="M42,18 C46,16 48,18 47,21 C46,22 44,22 42,21" fill="none" stroke="url(#bak-gold)" stroke-width="1.2" opacity="0.8"/>
  <line x1="46.5" y1="19.5" x2="42" y2="19.5" stroke="url(#bak-gold)" stroke-width="0.7" opacity="0.6"/>

  <!-- Hard drive / disk body -->
  <rect x="14" y="16" width="20" height="14" rx="2" fill="url(#bak-teal)" opacity="0.85" stroke="url(#bak-gold)" stroke-width="0.6"/>
  <!-- Drive platter lines -->
  <line x1="16" y1="20" x2="32" y2="20" stroke="#1C2731" stroke-width="0.5" opacity="0.4"/>
  <line x1="16" y1="24" x2="32" y2="24" stroke="#1C2731" stroke-width="0.5" opacity="0.4"/>
  <line x1="16" y1="28" x2="32" y2="28" stroke="#1C2731" stroke-width="0.5" opacity="0.4"/>
  <!-- Drive LED indicator -->
  <circle cx="31" cy="18" r="1" fill="#FFE082" opacity="0.9"/>

  <!-- Lock overlay on drive (encrypted) -->
  <rect x="20" y="20" width="8" height="6" rx="1" fill="url(#bak-gold)" opacity="0.85"/>
  <path d="M22,20 L22,18 A2,2 0 0,1 26,18 L26,20" fill="none" stroke="url(#bak-gold)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="24" cy="22.5" r="1.2" fill="#1C2731"/>
  <rect x="23.5" y="23.2" width="1" height="1.5" fill="#1C2731"/>

  <!-- Download arrow (snapshot/backup symbol) -->
  <line x1="24" y1="32" x2="24" y2="38" stroke="url(#bak-gold)" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="20,35.5 24,39 28,35.5" fill="none" stroke="url(#bak-gold)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Base line (destination) -->
  <line x1="18" y1="40" x2="30" y2="40" stroke="url(#bak-gold)" stroke-width="1" opacity="0.7" stroke-linecap="round"/>

  <!-- "AES" label -->
  <text x="24" y="44.5"
        text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="5" font-weight="900"
        letter-spacing="0.5"
        fill="url(#bak-gold)"
        opacity="0.95">AES</text>

</svg>
