<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="ss-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="ss-amber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#FF6F00"/>
    </linearGradient>
    <linearGradient id="ss-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1505"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <filter id="ss-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle — clock face feel -->
  <circle cx="24" cy="24" r="22" fill="url(#ss-bg)" stroke="url(#ss-gold)" stroke-width="1.8" filter="url(#ss-glow)"/>
  <!-- Outer ring detail -->
  <circle cx="24" cy="24" r="19" fill="none" stroke="url(#ss-gold)" stroke-width="0.5" opacity="0.35"/>

  <!-- Clock face tick marks — 12 positions -->
  <g stroke="url(#ss-gold)" stroke-linecap="square" opacity="0.7">
    <!-- Major ticks at 12, 3, 6, 9 -->
    <line x1="24" y1="5" x2="24" y2="8" stroke-width="1.5"/>
    <line x1="43" y1="24" x2="40" y2="24" stroke-width="1.5"/>
    <line x1="24" y1="43" x2="24" y2="40" stroke-width="1.5"/>
    <line x1="5" y1="24" x2="8" y2="24" stroke-width="1.5"/>
    <!-- Minor ticks -->
    <line x1="34.5" y1="6.6" x2="33.3" y2="8.7" stroke-width="0.8"/>
    <line x1="41.4" y1="13.5" x2="39.3" y2="14.7" stroke-width="0.8"/>
    <line x1="41.4" y1="34.5" x2="39.3" y2="33.3" stroke-width="0.8"/>
    <line x1="34.5" y1="41.4" x2="33.3" y2="39.3" stroke-width="0.8"/>
    <line x1="13.5" y1="41.4" x2="14.7" y2="39.3" stroke-width="0.8"/>
    <line x1="6.6" y1="34.5" x2="8.7" y2="33.3" stroke-width="0.8"/>
    <line x1="6.6" y1="13.5" x2="8.7" y2="14.7" stroke-width="0.8"/>
    <line x1="13.5" y1="6.6" x2="14.7" y2="8.7" stroke-width="0.8"/>
  </g>

  <!-- Clock hands — showing ~10:10 (classic display position) -->
  <!-- Hour hand — thick, pointing to ~10 -->
  <line x1="24" y1="24" x2="15" y2="14"
        stroke="url(#ss-gold)" stroke-width="2.5" stroke-linecap="round" filter="url(#ss-glow)"/>
  <!-- Minute hand — thinner, pointing to ~2 -->
  <line x1="24" y1="24" x2="33" y2="13"
        stroke="url(#ss-gold)" stroke-width="1.5" stroke-linecap="round" filter="url(#ss-glow)"/>
  <!-- Seconds hand — thin accent, countdown feel, pointing to ~6 -->
  <line x1="24" y1="24" x2="24" y2="37"
        stroke="#EF5350" stroke-width="1" stroke-linecap="round" opacity="0.9"/>
  <!-- Center cap -->
  <circle cx="24" cy="24" r="2" fill="url(#ss-gold)" filter="url(#ss-glow)"/>

  <!-- Shield overlay (bottom half, smaller) — session protection -->
  <path d="M24,31 L33,34 L33,40 C33,44 29,47 24,48.5 C19,47 15,44 15,40 L15,34 Z"
        fill="#0a0e1a" stroke="url(#ss-gold)" stroke-width="1.5" filter="url(#ss-glow)"/>
  <!-- Lock on mini shield -->
  <rect x="21.5" y="39" width="5" height="4" rx="0.8" fill="url(#ss-gold)"/>
  <path d="M22.5,39 L22.5,37 A1.5,1.5 0 0,1 25.5,37 L25.5,39" fill="none" stroke="url(#ss-gold)" stroke-width="1.2"/>

  <!-- Countdown arc — partial arc indicating time running out -->
  <!-- Arc from 12 o'clock going ~270 degrees clockwise (3/4 of circle) -->
  <path d="M24,5 A19,19 0 1,1 5,24"
        fill="none" stroke="url(#ss-amber)" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>

</svg>
