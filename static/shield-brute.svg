<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bf-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="bf-wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#546E7A"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
    <linearGradient id="bf-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="bf-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <filter id="bf-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="2" y="2" width="44" height="44" rx="5" fill="url(#bf-bg)" stroke="url(#bf-gold)" stroke-width="1.8" filter="url(#bf-glow)"/>

  <!-- WALL — fortress brickwork, right 2/3 of icon -->
  <!-- Course 1 (top) -->
  <rect x="18" y="8"  width="13" height="7" rx="0.5" fill="url(#bf-wall)" stroke="#37474F" stroke-width="0.6"/>
  <rect x="32" y="8"  width="11" height="7" rx="0.5" fill="url(#bf-wall)" stroke="#37474F" stroke-width="0.6"/>
  <!-- Crenellation / battlements -->
  <rect x="20" y="5" width="4" height="4" rx="0.3" fill="url(#bf-wall)" stroke="#37474F" stroke-width="0.6"/>
  <rect x="28" y="5" width="4" height="4" rx="0.3" fill="url(#bf-wall)" stroke="#37474F" stroke-width="0.6"/>
  <rect x="36" y="5" width="4" height="4" rx="0.3" fill="url(#bf-wall)" stroke="#37474F" stroke-width="0.6"/>
  <!-- Course 2 -->
  <rect x="22" y="16" width="12" height="7" rx="0.5" fill="url(#bf-wall)" stroke="#37474F" stroke-width="0.6"/>
  <rect x="35" y="16" width="9"  height="7" rx="0.5" fill="url(#bf-wall)" stroke="#37474F" stroke-width="0.6"/>
  <!-- Course 3 -->
  <rect x="18" y="24" width="13" height="7" rx="0.5" fill="url(#bf-wall)" stroke="#37474F" stroke-width="0.6"/>
  <rect x="32" y="24" width="11" height="7" rx="0.5" fill="url(#bf-wall)" stroke="#37474F" stroke-width="0.6"/>
  <!-- Course 4 (bottom) -->
  <rect x="22" y="32" width="12" height="10" rx="0.5" fill="url(#bf-wall)" stroke="#37474F" stroke-width="0.6"/>
  <rect x="35" y="32" width="9"  height="10" rx="0.5" fill="url(#bf-wall)" stroke="#37474F" stroke-width="0.6"/>

  <!-- IMPACT MARKS on wall — spall cracks from deflected hits -->
  <g stroke="#90A4AE" stroke-width="0.7" opacity="0.7">
    <line x1="28" y1="12" x2="25" y2="10"/><line x1="28" y1="12" x2="31" y2="10"/><line x1="28" y1="12" x2="28" y2="15"/>
    <line x1="36" y1="22" x2="33" y2="19"/><line x1="36" y1="22" x2="39" y2="20"/>
    <line x1="24" y1="28" x2="22" y2="25"/><line x1="24" y1="28" x2="27" y2="26"/>
  </g>
  <!-- Impact burst dots -->
  <circle cx="28" cy="12" r="1.5" fill="#FF8F00" opacity="0.8"/>
  <circle cx="36" cy="22" r="1.5" fill="#FF8F00" opacity="0.8"/>
  <circle cx="24" cy="28" r="1.5" fill="#FF8F00" opacity="0.8"/>

  <!-- DEFLECTED ARROWS / PROJECTILES (bouncing off wall) -->
  <!-- Arrow 1 — coming from left, deflecting down-left -->
  <g stroke="url(#bf-red)" stroke-width="1.5" stroke-linecap="round" opacity="0.9">
    <!-- Incoming shaft -->
    <line x1="4" y1="10" x2="17" y2="13"/>
    <!-- Arrowhead -->
    <polygon points="17,13 12,10 13,15" fill="url(#bf-red)"/>
    <!-- Deflected path (ricocheting off) -->
    <line x1="17" y1="13" x2="8" y2="20"/>
    <polygon points="8,20 13,17 10,23" fill="url(#bf-red)" opacity="0.6"/>
  </g>
  <!-- Arrow 2 — coming from upper-left -->
  <g stroke="url(#bf-red)" stroke-width="1.5" stroke-linecap="round" opacity="0.8">
    <line x1="5" y1="22" x2="17" y2="24"/>
    <polygon points="17,24 12,21 12,27" fill="url(#bf-red)"/>
    <line x1="17" y1="24" x2="7" y2="32"/>
    <polygon points="7,32 13,29 9,35" fill="url(#bf-red)" opacity="0.5"/>
  </g>
  <!-- Arrow 3 — lower approach -->
  <g stroke="url(#bf-red)" stroke-width="1.2" stroke-linecap="round" opacity="0.7">
    <line x1="4" y1="35" x2="16" y2="34"/>
    <polygon points="16,34 11,31 11,37" fill="url(#bf-red)"/>
    <line x1="16" y1="34" x2="6" y2="42"/>
    <polygon points="6,42 12,38 8,44" fill="url(#bf-red)" opacity="0.5"/>
  </g>

  <!-- Gold accent bottom border on wall -->
  <line x1="18" y1="43" x2="44" y2="43" stroke="url(#bf-gold)" stroke-width="1" opacity="0.5"/>

</svg>
